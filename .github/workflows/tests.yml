name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # The unit tests are numpy-only (no dolfinx / gmsh / NEURON), so a
      # plain pip install of the package + its test extra is all that's needed.
      - name: Install
        run: pip install -e '.[test]'
      - name: Run tests
        run: pytest
